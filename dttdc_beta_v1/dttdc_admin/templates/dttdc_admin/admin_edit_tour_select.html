{% extends "dttdc_admin/admin_hub.html" %}
{% block edit_tour_select %}

<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-8">

      <div class="card shadow-sm">
        <div class="card-header text-center">
          <h5 class="text-danger mb-0">Edit Tour</h5>
        </div>

        <div class="card-body">
          <p class="mb-3 text-black">
            Select a category and tour to edit. On selection you'll be taken to the edit page.
          </p>

          <form method="post">
  {% csrf_token %}

  <!-- CATEGORY -->
  <div class="mb-3">
    <label class="form-label fw-bold">Choose Category</label>
    <select name="category" class="form-select" onchange="this.form.submit()">
      <option value="">-- Select category --</option>
      {% for category in categories %}
        <option value="{{ category.id }}"
          {% if selected_category and category.id == selected_category.id %}selected{% endif %}>
          {{ category.category_name }}
        </option>
      {% endfor %}
    </select>
  </div>

  <!-- TOUR -->
  {% if tours %}
  <div class="mb-3">
    <label class="form-label fw-bold">Choose Tour</label>
    <select name="tour" class="form-select" required>
      <option value="">-- Select tour --</option>
      {% for tour in tours %}
        <option value="{{ tour.id }}">
          {{ tour.tour_name }}
        </option>
      {% endfor %}
    </select>
  </div>

  <button type="submit" name="go_to_edit" class="btn btn-primary">
    Go to Edit
  </button>
  
  {% endif %}
</form>

        </div>
      </div>

    </div>
  </div>
</div>


{% endblock %}
