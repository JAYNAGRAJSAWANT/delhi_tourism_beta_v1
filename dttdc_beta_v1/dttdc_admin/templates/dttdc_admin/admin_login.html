{% extends "dttdc_admin/base_admin.html" %}
{% load static %}

{% block content %}
<style>
/* Keep visual appearance same — just alignment fixes */
.password-toggle-icon {
    position: absolute;
    top: 70%;
    right: 12px;
    transform: translateY(-50%);
    cursor: pointer;
    color: #555;
    z-index: 2;
    font-size: 1.0rem;
}

/* ensure the input has room for the icon (you already use pe-5 on input) */
.form-card {
  max-width: 640px;
  margin: 0 auto;
}

/* Small spacing tweaks */
.card-body .mb-3 { margin-bottom: 0.9rem; }

/* Center captcha canvas and controls */
.captcha-wrap {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: nowrap;
}

.captcha-wrap canvas {
  border-radius: 4px;
  display: inline-block;
}

/* make the small text width for form rows on narrow devices */
@media (max-width: 575.98px) {
  .form-card { padding-left: 1rem; padding-right: 1rem; }
}

/* Slightly reduce eye icon on very small screens */
@media (max-width: 375px) {
  .password-toggle-icon { font-size: 0.95rem; right: 8px; }
}
</style>

<div class="container mb-4">
  <div class="row my-4">
    <div class="col-12">
      <h1 class="text-center fw-bold fs-4" style="color:rgb(170, 22, 22);">DTTC Admin Login</h1>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8 form-card">

      <!-- Card wrapper for nice spacing/structure -->
      <div class="card shadow-sm">
        <div class="card-body">

          <div class="row mb-3">
            <div class="col-12 text-center">
              <h2 class="text-center fw-semibold fs-5 mb-0">Admin Login</h2>
            </div>
          </div>

          <div class="row">
            <div class="col-12">
              <form method="post" action="">
                {% csrf_token %}

                <!-- Email -->
                <div class="mb-3">
                  <label for="email" class="form-label">Email Address</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    aria-describedby="emailHelp"
                    required
                  />
                </div>

                <!-- Password -->
                <div class="mb-3 position-relative">
                  <label for="password" class="form-label">Password</label>

                  <input
                    type="password"
                    class="form-control pe-5"
                    id="password"
                    name="password"
                    required
                  />

                  <!-- Eye Icon -->
                  <span
                    class="password-toggle-icon"
                    onclick="togglePassword()"
                    role="button"
                    aria-label="Toggle password visibility"
                    title="Show/Hide password"
                  >
                    <i id="eyeIcon" class="fa fa-eye-slash" aria-hidden="true"></i>
                  </span>
                </div>

                <!-- Captcha Block -->
                <div class="mb-3 row w-100 align-items-center">
                  <label class="col-sm-3 col-form-label required">Captcha</label>

                  <div class="col-sm-9">
                    <div class="captcha-wrap">
                      <!-- Canvas CAPTCHA -->
                      <canvas
                        id="captchaCanvas"
                        class="border rounded"
                        width="150"
                        height="50"
                      >
                        TEXT
                      </canvas>

                      <!-- Reload icon -->
                      <i
                        class="fa fa-refresh"
                        aria-hidden="true"
                        role="button"
                        title="Reload Captcha"
                        style="cursor:pointer; font-size:1.1rem;"
                        onclick="reloadCaptcha()"
                      ></i>
                    </div>
                  </div>
                </div>

                <!-- Captcha Input -->
                <div class="mb-3 row w-100">
                  <label for="userCaptchaInput" class="col-sm-3 col-form-label required">
                    Enter Captcha
                  </label>

                  <div class="col-sm-9">
                    <input
                      id="userCaptchaInput"
                      name="user_captcha_input"
                      class="form-control"
                      placeholder="Enter Captcha"
                      type="text"
                      maxlength="6"
                      required
                    />
                  </div>
                </div>

                <!-- Hidden Captcha Token -->
                <input
                  type="hidden"
                  id="captchaTokenField"
                  name="captchaToken"
                  value="{{ captcha_token }}"
                />

                <!-- Error Message -->
                {% if error_message %}
                <div class="alert alert-danger p-2 fw-bold mt-2">
                  {{ error_message }}
                </div>
                {% endif %}

                <!-- Submit Button -->
                <div class="d-flex justify-content-start mt-3">
                  <button
                    type="submit"
                    class="btn btn-primary"
                    style="background: rgb(170, 22, 22); border: none;"
                  >
                    Login
                  </button>
                </div>
              </form>
            </div>
          </div>

        </div><!-- card-body -->
      </div><!-- card -->

    </div>
  </div>
</div>
{% endblock %}


{% block extra_js %}
<script>
  let CAPTCHA_VALUE = "{{ captcha_value|escapejs }}";

  function drawLine(info, style = {}) {
    const { x, y, x1, y1 } = info;
    const { color = "black", width = 1 } = style;

    const canvas = document.getElementById("captchaCanvas");
    const ctx = canvas.getContext("2d");

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x1, y1);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.stroke();
  }

  function drawCaptcha(value) {
    const canvas = document.getElementById("captchaCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Noise lines (same as your React version)
    drawLine({ x: 0, y: 10, x1: 50, y1: 100 });
    drawLine({ x: 60, y: 0, x1: 100, y1: 200 }, { color: "red" });
    drawLine({ x: 75, y: 0, x1: 200, y1: 200 }, { color: "green" });
    drawLine({ x: 110, y: 0, x1: 500, y1: 250 }, { color: "blue" });

    ctx.font = "18px Arial";

    if (!value || value.length < 6) return;

    ctx.fillText(value.charAt(0), 6, 15);
    ctx.fillText(value.charAt(1), 25, 30);
    ctx.fillText(value.charAt(2), 50, 20);
    ctx.fillText(value.charAt(3), 70, 40);
    ctx.fillText(value.charAt(4), 100, 15);
    ctx.fillText(value.charAt(5), 120, 35);
  }

  // Initial draw
  document.addEventListener("DOMContentLoaded", function () {
    drawCaptcha(CAPTCHA_VALUE);
  });

  // Reload captcha button handler
  async function reloadCaptcha() {
    const response = await fetch("{% url 'get_captcha' %}");
    const data = await response.json();
    console.log("Captcha data : ", data)

    CAPTCHA_VALUE = data.captchaValue;
    document.getElementById("captchaTokenField").value =
      data.captchaToken;

    drawCaptcha(CAPTCHA_VALUE);
  }
</script>
<script>
function togglePassword() {
    const pass = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if (pass.type === "password") {
        pass.type = "text";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    } else {
        pass.type = "password";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }
}
</script>

{% endblock %}
